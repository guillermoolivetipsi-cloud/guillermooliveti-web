    <script>
        // Lógica de inyección de recursos (textos)
        document.addEventListener("DOMContentLoaded", function() {
            function getValue(path, obj) {
                return path.split('.').reduce((acc, part) => acc && acc[part], obj);
            }
            document.querySelectorAll("[data-t]").forEach(function(el) {
                var val = getValue(el.getAttribute("data-t"), siteTexts);
                if (val !== undefined && val !== null) {
                    el.innerHTML = val;
                }
            });
        });

        function toggleFaq(btn) {
            var item = btn.parentElement;
            var open = item.classList.contains('open');
            document.querySelectorAll('.faq-item.open').forEach(function (el) { el.classList.remove('open') });
            if (!open) item.classList.add('open');
        }
        var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target) } });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(function (el) { obs.observe(el) });
        function animateNum(el, target) {
            var start = 0, step = target / 50, suffix = target > 2 ? '+' : '';
            var timer = setInterval(function () {
                start += step;
                if (start >= target) { start = target; clearInterval(timer) }
                el.textContent = Math.floor(start) + suffix;
            }, 30);
        }
        var numObs = new IntersectionObserver(function (entries) {
            entries.forEach(function (e) {
                if (e.isIntersecting) { animateNum(e.target, parseInt(e.target.getAttribute('data-target'))); numObs.unobserve(e.target) }
            });
        }, { threshold: 0.5 });
        document.querySelectorAll('.sn[data-target]').forEach(function (el) { numObs.observe(el) });
    </script>
